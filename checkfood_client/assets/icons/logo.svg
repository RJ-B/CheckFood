<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dome gradient: deep navy to steel blue -->
    <linearGradient id="dome" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="40%" stop-color="#0E3854"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>

    <!-- Dome highlight: subtle top-left shine -->
    <radialGradient id="domeShine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Checkmark gradient: rich emerald -->
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Checkmark glow -->
    <filter id="checkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.06  0 0 0 0 0.73  0 0 0 0 0.51  0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Plate gradient: navy to teal blend -->
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="40%" stop-color="#1B4F72"/>
      <stop offset="80%" stop-color="#0E7363"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Plate highlight -->
    <linearGradient id="plateShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Knob gradient -->
    <radialGradient id="knob" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </radialGradient>

    <!-- Knob highlight -->
    <radialGradient id="knobShine" cx="0.35" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for dome -->
    <filter id="domeShadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Plate shadow -->
    <filter id="plateShadow" x="-5%" y="-20%" width="110%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === Cloche Dome (with shadow) === -->
  <g filter="url(#domeShadow)">
    <!-- Dome body -->
    <path d="M80 310 C80 175, 165 100, 256 100 C347 100, 432 175, 432 310 Z"
          fill="url(#dome)"/>
    <!-- Dome shine overlay -->
    <path d="M80 310 C80 175, 165 100, 256 100 C347 100, 432 175, 432 310 Z"
          fill="url(#domeShine)"/>
  </g>

  <!-- === Knob on top === -->
  <ellipse cx="256" cy="96" rx="24" ry="20" fill="url(#knob)"/>
  <ellipse cx="256" cy="96" rx="24" ry="20" fill="url(#knobShine)"/>

  <!-- === Rim detail: thin line between dome and plate === -->
  <rect x="65" y="306" width="382" height="4" rx="2" fill="#1B4F72" opacity="0.6"/>

  <!-- === Plate base (with shadow) === -->
  <g filter="url(#plateShadow)">
    <rect x="55" y="310" width="402" height="30" rx="15" fill="url(#plate)"/>
    <rect x="55" y="310" width="402" height="15" rx="8" fill="url(#plateShine)"/>
  </g>

  <!-- === Checkmark (with glow) === -->
  <path d="M168 265 L232 335 L368 185"
        fill="none" stroke="url(#check)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#checkGlow)"/>

  <!-- Checkmark inner highlight -->
  <path d="M172 260 L234 328 L364 182"
        fill="none" stroke="white" stroke-width="6" stroke-opacity="0.12"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
