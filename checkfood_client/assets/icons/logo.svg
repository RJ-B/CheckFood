<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="dome" x1="80" y1="100" x2="350" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>
    <radialGradient id="knob" cx="248" cy="90" r="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </radialGradient>
    <linearGradient id="plate" x1="55" y1="325" x2="457" y2="325" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="50%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="check" x1="168" y1="335" x2="368" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Cloche dome -->
  <path d="M80 310 C80 175, 165 100, 256 100 C347 100, 432 175, 432 310 Z"
        fill="url(#dome)"/>

  <!-- Dome highlight -->
  <path d="M130 280 C130 195, 185 135, 256 135 C300 135, 340 160, 365 200 C340 155, 300 125, 256 125 C190 125, 115 190, 110 290 Z"
        fill="white" fill-opacity="0.08"/>

  <!-- Knob on top -->
  <path d="M256 96 m-24 0 a24 20 0 1 1 48 0 a24 20 0 1 1 -48 0"
        fill="url(#knob)"/>

  <!-- Knob highlight -->
  <path d="M244 88 a14 10 0 1 1 16 0 a14 10 0 1 1 -16 0"
        fill="white" fill-opacity="0.15"/>

  <!-- Rim line between dome and plate -->
  <path d="M65 306 L447 306 L447 310 C447 312.2, 445.2 314, 443 314 L69 314 C66.8 314, 65 312.2, 65 310 Z"
        fill="#1B4F72" fill-opacity="0.6"/>

  <!-- Plate base -->
  <path d="M55 310 L457 310 L457 325 C457 333.3, 450.3 340, 442 340 L70 340 C61.7 340, 55 333.3, 55 325 Z"
        fill="url(#plate)"/>

  <!-- Plate top highlight -->
  <path d="M55 310 L457 310 L457 320 C457 324.4, 454.4 327, 450 327 L62 327 C57.6 327, 55 324.4, 55 320 Z"
        fill="white" fill-opacity="0.1"/>

  <!-- Checkmark -->
  <path d="M168 265 L232 335 L368 185"
        fill="none" stroke="url(#check)" stroke-width="44"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark inner highlight -->
  <path d="M172 260 L234 328 L364 182"
        fill="none" stroke="white" stroke-width="5" stroke-opacity="0.1"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
