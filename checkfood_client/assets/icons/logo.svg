<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dome gradient: dark navy to steel blue -->
    <linearGradient id="dome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#1B4F72"/>
    </linearGradient>
    <!-- Checkmark gradient: emerald green -->
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Plate gradient -->
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="50%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Knob on top -->
  <circle cx="230" cy="100" r="22" fill="url(#dome)"/>

  <!-- Cloche dome -->
  <path d="M80 310 C80 180, 160 105, 230 105 C300 105, 380 180, 380 310 Z"
        fill="url(#dome)"/>

  <!-- Plate base line -->
  <rect x="60" y="310" width="380" height="28" rx="14" fill="url(#plate)"/>

  <!-- Checkmark -->
  <path d="M155 275 L225 345 L370 185"
        fill="none" stroke="url(#check)" stroke-width="52"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
