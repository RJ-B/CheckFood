name: checkfood_client
description: "CheckFood mobile client application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

generate: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Základní UI a Ikony ---
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  gap: ^3.0.1

  # --- Architektura a State Management ---
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  get_it: ^7.7.0

  # --- Navigace a Deep Linking ---
  go_router: ^14.0.0
  app_links: ^6.3.2

  # --- Konfigurace prostředí ---
  flutter_dotenv: ^5.2.1

  # --- Síťová komunikace ---
  dio: ^5.4.3
  internet_connection_checker: ^1.0.0+1

  # --- Autentizace a OAuth ---
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  jwt_decoder: ^2.0.1

  # --- Serializace a Imutabilita ---
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # --- Lokální úložiště a Bezpečnost ---
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # --- Práce se zařízením a Soubory ---
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  io: ^1.0.4

  # --- Push Notifikace (Firebase) ---
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1

  # --- Kamera a Senzory ---
  camera: ^0.11.0+2
  sensors_plus: ^6.1.1

  # --- Vyber fotek ---
  image_picker: ^1.1.2

  # --- Média a Zobrazování ---
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0

  # --- Mapy a Interaktivní UI ---
  # Používáme nejnovější verzi Google Maps
  google_maps_flutter: ^2.10.0

  # (Fluster byl odstraněn - clustering nyní řeší backend PostGIS)

  sliding_up_panel: ^2.0.0+1
  geolocator: ^13.0.0

  # --- Utility a Formátování ---
  stream_transform: ^2.1.0
  intl: any
  logger: ^2.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # --- Testování ---
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # --- Generování kódu ---
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # --- Nástroje ---
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# --------------------------------------------------
# Konfigurace ikony aplikace
# --------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/CheckFood_icon.png

# --------------------------------------------------
# Konfigurace Splash Screenu
# --------------------------------------------------
flutter_native_splash:
  color: "#0F2027"
  image: assets/icons/CheckFood_icon.png
  android_12:
    color: "#0F2027"
    image: assets/icons/CheckFood_icon.png

# --------------------------------------------------
# Nastavení Assets a Fontů
# --------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/three/
    - assets/panoramas/
    - assets/map_style.json
    - .env
    - .env.local
    - .env.prod
