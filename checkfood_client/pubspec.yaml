name: checkfood_client
description: "CheckFood mobile client application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

generate: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Základní UI a Ikony ---
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  google_fonts: ^8.0.2
  gap: ^3.0.1

  # --- Architektura a State Management ---
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^9.2.1

  # --- Navigace a Deep Linking ---
  go_router: ^17.1.0
  app_links: ^7.0.0

  # --- Konfigurace prostředí ---
  flutter_dotenv: ^6.0.0

  # --- Síťová komunikace ---
  dio: ^5.4.3
  internet_connection_checker: ^3.0.1

  # --- Autentizace a OAuth ---
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  jwt_decoder: ^2.0.1

  # --- Serializace a Imutabilita ---
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # --- Lokální úložiště a Bezpečnost ---
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # --- Práce se zařízením a Soubory ---
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  io: ^1.0.4

  # --- Push Notifikace (Firebase) ---
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # --- Kamera a Senzory ---
  camera: ^0.12.0+1
  sensors_plus: ^7.0.0

  # --- Vyber fotek ---
  image_picker: ^1.1.2

  # --- Média a Zobrazování ---
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  webview_flutter: ^4.8.0
  webview_flutter_android: ^4.10.13

  # --- Mapy a Interaktivní UI ---
  # Používáme nejnovější verzi Google Maps
  google_maps_flutter: ^2.10.0

  # (Fluster byl odstraněn - clustering nyní řeší backend PostGIS)

  sliding_up_panel: ^2.0.0+1
  geolocator: ^14.0.2

  # --- Utility a Formátování ---
  stream_transform: ^2.1.0
  intl: any
  logger: ^2.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # --- Testování ---
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # --- Generování kódu ---
  build_runner: ^2.4.9
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  # --- Nástroje ---
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

# --------------------------------------------------
# Konfigurace ikony aplikace
# --------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/CheckFood_icon.png

# --------------------------------------------------
# Konfigurace Splash Screenu
# --------------------------------------------------
flutter_native_splash:
  color: "#0F2027"
  image: assets/icons/CheckFood_icon.png
  android_12:
    color: "#0F2027"
    image: assets/icons/CheckFood_icon.png

# --------------------------------------------------
# Nastavení Assets a Fontů
# --------------------------------------------------
flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/three/
    - assets/panoramas/
    - assets/map_style.json
    - .env
    - .env.local
    - .env.prod
