# Render.com deployment config
# DB: Supabase (external PostgreSQL + PostGIS)
# App: Spring Boot Docker container

services:
  - type: web
    name: checkfood-api
    runtime: docker
    rootDir: ./checkfood_service
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: APP_BACKEND_URL
        sync: false
