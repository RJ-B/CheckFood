name: Cloud Run Health Check

on:
  # Každých 15 minut
  schedule:
    - cron: '*/15 * * * *'
  # Po deployi
  workflow_run:
    workflows:
      - "Deploy to Cloud Run"
    types:
      - completed
  workflow_dispatch:

jobs:
  healthcheck:
    name: Check API Health
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deploy (only after workflow_run)
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 60

      - name: Check health endpoint
        id: health
        run: |
          HEALTH_URL="${{ vars.CLOUD_RUN_HEALTH_URL }}"

          if [ -z "$HEALTH_URL" ]; then
            echo "CLOUD_RUN_HEALTH_URL not set. Skipping."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Checking: $HEALTH_URL"

          MAX_RETRIES=3
          RETRY=0
          STATUS="down"
          HTTP_CODE=0

          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              --connect-timeout 30 --max-time 60 "$HEALTH_URL" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              STATUS="up"
              break
            fi

            RETRY=$((RETRY + 1))
            echo "Attempt $RETRY/$MAX_RETRIES failed (HTTP $HTTP_CODE). Retrying in 30s..."
            sleep 30
          done

          RESPONSE=$(cat /tmp/health_response.json 2>/dev/null || echo '{"status":"unreachable"}')
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $RESPONSE"

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"

      - name: Report failure
        if: ${{ steps.health.outputs.status == 'down' }}
        uses: actions/github-script@v7
        with:
          script: |
            const httpCode = '${{ steps.health.outputs.http_code }}';
            const response = '${{ steps.health.outputs.response }}';

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-error,health-failure',
              state: 'open',
            });

            if (existingIssues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `## Health check stále selhává\n\n` +
                  `**HTTP:** ${httpCode}\n` +
                  `**Response:** \`${response}\`\n` +
                  `**Time:** ${new Date().toISOString()}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO-ERROR] Cloud Run API health check failed',
              labels: ['auto-error', 'health-failure'],
              body: `## Cloud Run Health Check Failure\n\n` +
                `| Field | Value |\n` +
                `|-------|-------|\n` +
                `| **Source** | Cloud Run health check |\n` +
                `| **Service** | checkfood-api |\n` +
                `| **Severity** | critical |\n` +
                `| **HTTP Code** | ${httpCode} |\n` +
                `| **Response** | \`${response}\` |\n` +
                `| **Timestamp** | ${new Date().toISOString()} |\n\n` +
                `---\n\n` +
                `> Health check endpoint: \`/actuator/health\`\n` +
                `> Tři po sobě jdoucí pokusy selhaly.\n` +
                `> Zkontrolujte Cloud Run console a logy.`,
            });

      - name: Auto-close health issue on recovery
        if: ${{ steps.health.outputs.status == 'up' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-error,health-failure',
              state: 'open',
            });

            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Recovered\n\nHealth check passed at ${new Date().toISOString()}. Closing issue.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
