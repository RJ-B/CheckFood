name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: checkfood_client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Create .env files for build
        run: |
          cat <<'ENVEOF' > .env
          API_BASE_URL=https://checkfood-api.onrender.com/api
          GOOGLE_WEB_CLIENT_ID=placeholder
          APPLE_CLIENT_ID=com.checkfood.checkfood_client
          APPLE_REDIRECT_URL=https://checkfood-api.onrender.com/api/oauth/apple/callback
          ENVEOF
          sed -i 's/^ *//' .env
          cp .env .env.prod
          cp .env .env.local

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: checkfood_client/build/app/outputs/flutter-apk/app-release.apk