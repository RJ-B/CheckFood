name: Build & Release Android APK

on:
  # On-demand only — releases shouldn't fire on every commit. Trigger
  # manually from the Actions tab when you actually want to publish a
  # GitHub Release with a signed APK for QA distribution. The
  # `flutter-android.yml` workflow still validates the release-build
  # path on every push.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Create .env files for build
        working-directory: checkfood_client
        run: |
          cat <<'ENVEOF' > .env
          API_BASE_URL=https://checkfood-api-809801655996.europe-central2.run.app/api
          GOOGLE_WEB_CLIENT_ID=placeholder
          APPLE_CLIENT_ID=com.checkfood.checkfood_client
          APPLE_REDIRECT_URL=https://checkfood-api-809801655996.europe-central2.run.app/api/oauth/apple/callback
          ENVEOF
          sed -i 's/^ *//' .env
          cp .env .env.prod
          cp .env .env.local

      - name: Install dependencies
        working-directory: checkfood_client
        run: flutter pub get

      - name: Build release APK
        working-directory: checkfood_client
        run: flutter build apk --release

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' checkfood_client/pubspec.yaml | awk '{print $2}')
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: CheckFood Build ${{ github.run_number }}
          body: |
            Automated build from GitHub Actions.

            **App version:** ${{ steps.version.outputs.app_version }}
            **Build number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
          make_latest: "true"
          files: checkfood_client/build/app/outputs/flutter-apk/app-release.apk
