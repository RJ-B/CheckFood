name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Create .env files for build
        working-directory: checkfood_client
        run: |
          cat > .env << 'EOF'
          API_BASE_URL=https://checkfood-api.onrender.com/api
          GOOGLE_WEB_CLIENT_ID=809801655996-hiubgqhjj2ae8cn9872pc693evonrfvp.apps.googleusercontent.com
          APPLE_CLIENT_ID=com.checkfood.checkfood_client
          APPLE_REDIRECT_URL=https://checkfood-api.onrender.com/api/oauth/apple/callback
          GOOGLE_MAPS_API_KEY=AIzaSyB2ro-yzrhNW6SdgwLRUtm5RZeq-jMh1jk
          EOF
          sed -i 's/^ *//' .env
          cp .env .env.prod
          cp .env .env.local

      - name: Install dependencies
        working-directory: checkfood_client
        run: flutter pub get

      - name: Build release APK
        working-directory: checkfood_client
        run: flutter build apk --release

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' checkfood_client/pubspec.yaml | awk '{print $2}')
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: CheckFood Build ${{ github.run_number }}
          body: |
            Automated build from GitHub Actions.

            **App version:** ${{ steps.version.outputs.app_version }}
            **Build number:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
          make_latest: "true"
          files: checkfood_client/build/app/outputs/flutter-apk/app-release.apk
