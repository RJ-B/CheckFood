name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "checkfood_service/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Spring Boot
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: checkfood_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Run tests
        run: mvn test -B
        continue-on-error: true

      - name: Verify Docker build
        run: docker build -t checkfood-api:ci .
