name: CI Monitor — Failure Reporter

# Spouští se automaticky když JAKÝKOLIV workflow skončí
on:
  workflow_run:
    workflows:
      - "Backend CI"
      - "Deploy to Cloud Run"
      - "Build Android APK"
      - "Build & Release Android APK"
    types:
      - completed

jobs:
  report-failure:
    name: Report Build Failure
    runs-on: ubuntu-latest
    # Spustí se POUZE při selhání
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Collect failure details
        id: details
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;

            // Získej jobs pro tento workflow run
            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });

            // Najdi selhavší joby
            const failedJobs = jobsData.jobs.filter(j => j.conclusion === 'failure');

            // Pro každý selhavší job získej log
            let failedSteps = [];
            let logSnippets = [];

            for (const job of failedJobs) {
              const steps = job.steps.filter(s => s.conclusion === 'failure');
              failedSteps.push(...steps.map(s => `${job.name} → ${s.name}`));

              // Získej log pro selhavší job
              try {
                const { data: logData } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                // Vezmi posledních 100 řádků logu
                const lines = logData.split('\n');
                const tail = lines.slice(-100).join('\n');
                logSnippets.push(`### Job: ${job.name}\n\`\`\`\n${tail}\n\`\`\``);
              } catch (e) {
                logSnippets.push(`### Job: ${job.name}\nLog nedostupný: ${e.message}`);
              }
            }

            // Určit service a severity
            let service = 'unknown';
            let errorType = 'build_fail';
            if (run.name.includes('Backend')) {
              service = 'checkfood-api';
            } else if (run.name.includes('Android') || run.name.includes('Flutter')) {
              service = 'checkfood-client';
            }

            // Sestav error report
            const report = {
              source: 'github-ci',
              service: service,
              severity: 'critical',
              error_type: errorType,
              workflow: run.name,
              run_id: run.id,
              run_url: run.html_url,
              branch: run.head_branch,
              commit: run.head_sha.substring(0, 7),
              commit_message: run.head_commit?.message || 'unknown',
              failed_steps: failedSteps,
              timestamp: new Date().toISOString(),
            };

            core.setOutput('report', JSON.stringify(report));
            core.setOutput('service', service);
            core.setOutput('workflow_name', run.name);
            core.setOutput('run_url', run.html_url);
            core.setOutput('failed_steps', failedSteps.join(', '));
            core.setOutput('log_snippets', logSnippets.join('\n\n'));
            core.setOutput('commit', run.head_sha.substring(0, 7));
            core.setOutput('commit_message', run.head_commit?.message || 'unknown');

      - name: Create GitHub Issue for failure
        uses: actions/github-script@v7
        with:
          script: |
            const service = '${{ steps.details.outputs.service }}';
            const workflowName = '${{ steps.details.outputs.workflow_name }}';
            const runUrl = '${{ steps.details.outputs.run_url }}';
            const failedSteps = '${{ steps.details.outputs.failed_steps }}';
            const commit = '${{ steps.details.outputs.commit }}';
            const commitMessage = `${{ steps.details.outputs.commit_message }}`;
            const logSnippets = `${{ steps.details.outputs.log_snippets }}`;

            // Zkontroluj jestli už neexistuje otevřený issue pro stejný workflow
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-error,ci-failure',
              state: 'open',
            });

            const duplicateIssue = existingIssues.find(i =>
              i.title.includes(workflowName)
            );

            if (duplicateIssue) {
              // Přidej komentář k existujícímu issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicateIssue.number,
                body: `## Opakované selhání\n\n` +
                  `**Commit:** ${commit} — ${commitMessage}\n` +
                  `**Run:** ${runUrl}\n` +
                  `**Failed:** ${failedSteps}\n\n` +
                  `---\n\n${logSnippets}`,
              });
              console.log(`Updated existing issue #${duplicateIssue.number}`);
              return;
            }

            // Vytvoř nový issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO-ERROR] ${workflowName} failed — ${service}`,
              labels: ['auto-error', 'ci-failure'],
              body: `## CI Build Failure Report\n\n` +
                `| Field | Value |\n` +
                `|-------|-------|\n` +
                `| **Source** | GitHub Actions |\n` +
                `| **Service** | ${service} |\n` +
                `| **Workflow** | ${workflowName} |\n` +
                `| **Commit** | ${commit} — ${commitMessage} |\n` +
                `| **Failed Steps** | ${failedSteps} |\n` +
                `| **Run URL** | ${runUrl} |\n` +
                `| **Timestamp** | ${new Date().toISOString()} |\n\n` +
                `---\n\n## Error Logs\n\n${logSnippets}\n\n` +
                `---\n\n` +
                `> Tento issue byl vytvořen automaticky CI Monitorem.\n` +
                `> DevSecOps agent ho může zpracovat pomocí error classification tabulky.\n` +
                `> Zavřete issue po vyřešení problému.`,
            });

            console.log(`Created issue #${issue.number}: ${issue.html_url}`);

      # Volitelný webhook pro n8n nebo jinou automatizaci
      - name: Send webhook notification (optional)
        if: ${{ vars.CI_FAILURE_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.CI_FAILURE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '${{ steps.details.outputs.report }}'
        continue-on-error: true
