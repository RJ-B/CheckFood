name: Render Health Check

on:
  # Každých 15 minut kontroluje health endpoint
  schedule:
    - cron: '*/15 * * * *'
  # Po každém push na main (počká 5 min na Render deploy)
  workflow_run:
    workflows:
      - "Backend CI"
    types:
      - completed
  # Manuální spuštění
  workflow_dispatch:

jobs:
  healthcheck:
    name: Check API Health
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Render deploy (only after CI)
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 300  # 5 minut čekání na Render deploy

      - name: Check health endpoint
        id: health
        run: |
          HEALTH_URL="${{ vars.RENDER_HEALTH_URL }}"

          # Fallback na default URL pokud není nastavena
          if [ -z "$HEALTH_URL" ]; then
            HEALTH_URL="https://checkfood-api.onrender.com/actuator/health"
          fi

          echo "Checking: $HEALTH_URL"

          # 3 pokusy s 30s timeout
          MAX_RETRIES=3
          RETRY=0
          STATUS="down"
          HTTP_CODE=0

          while [ $RETRY -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              --connect-timeout 30 --max-time 60 "$HEALTH_URL" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              STATUS="up"
              break
            fi

            RETRY=$((RETRY + 1))
            echo "Attempt $RETRY/$MAX_RETRIES failed (HTTP $HTTP_CODE). Retrying in 30s..."
            sleep 30
          done

          RESPONSE=$(cat /tmp/health_response.json 2>/dev/null || echo '{"status":"unreachable"}')
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $RESPONSE"

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"

      - name: Report failure
        if: ${{ steps.health.outputs.status == 'down' }}
        uses: actions/github-script@v7
        with:
          script: |
            const httpCode = '${{ steps.health.outputs.http_code }}';
            const response = '${{ steps.health.outputs.response }}';

            // Zkontroluj jestli už neexistuje otevřený health issue
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-error,health-failure',
              state: 'open',
            });

            if (existingIssues.length > 0) {
              // Přidej komentář — neotevírej nový issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues[0].number,
                body: `## Health check stále selhává\n\n` +
                  `**HTTP:** ${httpCode}\n` +
                  `**Response:** \`${response}\`\n` +
                  `**Time:** ${new Date().toISOString()}`,
              });
              return;
            }

            // Vytvoř nový issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO-ERROR] Render API health check failed',
              labels: ['auto-error', 'health-failure'],
              body: `## Render Health Check Failure\n\n` +
                `| Field | Value |\n` +
                `|-------|-------|\n` +
                `| **Source** | Render health check |\n` +
                `| **Service** | checkfood-api |\n` +
                `| **Severity** | critical |\n` +
                `| **HTTP Code** | ${httpCode} |\n` +
                `| **Response** | \`${response}\` |\n` +
                `| **Timestamp** | ${new Date().toISOString()} |\n\n` +
                `---\n\n` +
                `> Health check endpoint: \`/actuator/health\`\n` +
                `> Tři po sobě jdoucí pokusy selhaly.\n` +
                `> Zkontrolujte Render dashboard a logy.`,
            });

      - name: Auto-close health issue on recovery
        if: ${{ steps.health.outputs.status == 'up' }}
        uses: actions/github-script@v7
        with:
          script: |
            // Pokud existuje otevřený health issue, zavři ho
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-error,health-failure',
              state: 'open',
            });

            for (const issue of openIssues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## ✅ Recovered\n\nHealth check passed at ${new Date().toISOString()}. Closing issue.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      # Volitelný webhook
      - name: Send webhook on failure (optional)
        if: ${{ steps.health.outputs.status == 'down' && vars.CI_FAILURE_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.CI_FAILURE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"healthcheck\",\"service\":\"checkfood-api\",\"severity\":\"critical\",\"error_type\":\"health_fail\",\"http_code\":\"${{ steps.health.outputs.http_code }}\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S)\"}"
        continue-on-error: true
