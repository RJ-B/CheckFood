# ===============================================================
# PRODUKCNI KONFIGURACE (PROFIL: prod)
# ===============================================================

# --- DATABAZE & HIBERNATE ---
# update = Automaticke vytvoreni/aktualizace schematu.
# Po vytvoreni Flyway migraci prepnout na 'validate'!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway: zapnuto, ale zatim bez migracnich souboru
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- DATASOURCE (Cloud SQL PostgreSQL + PostGIS) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql:///checkfood?cloudSqlInstance=checkfood-system-478116:europe-central2:checkfood-db&socketFactory=com.google.cloud.sql.postgres.SocketFactory}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- SERVER ---
server.port=${PORT:8081}
server.address=0.0.0.0

# --- PERFORMANCE TUNING (HIKARI CP for Cloud SQL) ---
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000

# --- LOGOVANI ---
logging.level.root=INFO
logging.level.com.checkfood=INFO
# Potlaceni nadbytecnych warnu
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# --- EMAIL ---
spring.mail.properties.mail.debug=false

# --- OSTATNI ---
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# --- ACTUATOR ---
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# --- FILE UPLOAD ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# --- SWAGGER (restricted in prod) ---
# Anonymous access disabled — /v3/api-docs and /swagger-ui/** require
# ROLE_ADMIN. This stops attackers from enumerating the full API surface.
app.swagger.public-access=false