# ===============================================================
# PRODUKCNI KONFIGURACE (PROFIL: prod)
# ===============================================================

# --- DATABAZE & HIBERNATE ---
# validate = Kontrola schematu, zadne automaticke zmeny
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# V produkci vzdy pouzivame Flyway migrace!
spring.flyway.enabled=true

# --- PERFORMANCE TUNING (HIKARI CP) ---
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# --- LOGOVANI ---
logging.level.root=INFO
logging.level.com.checkfood=INFO
# Potlaceni nadbytecnych warnu
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# --- EMAIL ---
spring.mail.properties.mail.debug=false

# --- OSTATNI ---
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false