# ===============================================================
# PRODUKCNI KONFIGURACE (PROFIL: prod)
# ===============================================================

# --- DATABAZE & HIBERNATE ---
# update = Automaticke vytvoreni/aktualizace schematu.
# Po vytvoreni Flyway migraci prepnout na 'validate'!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway: zapnuto, ale zatim bez migracnich souboru
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- DATASOURCE (Supabase PostgreSQL + PostGIS) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/checkfood}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- SERVER ---
server.port=${PORT:8081}
server.address=0.0.0.0

# --- PERFORMANCE TUNING (HIKARI CP) ---
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# --- LOGOVANI ---
logging.level.root=INFO
logging.level.com.checkfood=INFO
# Potlaceni nadbytecnych warnu
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# --- EMAIL ---
spring.mail.properties.mail.debug=false

# --- OSTATNI ---
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# --- ACTUATOR ---
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# --- FILE UPLOAD ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB