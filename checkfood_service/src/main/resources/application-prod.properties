# ===============================================================
# PRODUKCNI KONFIGURACE (PROFIL: prod)
# ===============================================================

# --- DATABAZE & HIBERNATE ---
# update = Automaticke vytvoreni/aktualizace schematu.
# Po vytvoreni Flyway migraci prepnout na 'validate'!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway: zapnuto, ale zatim bez migracnich souboru
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- RENDER DATASOURCE (JDBC z komponent) ---
spring.datasource.url=jdbc:postgresql://${DB_RENDER_HOST:localhost}:${DB_RENDER_PORT:5432}/${DB_RENDER_NAME:checkfood}

# --- SERVER ---
server.address=0.0.0.0

# --- PERFORMANCE TUNING (HIKARI CP) ---
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# --- LOGOVANI ---
logging.level.root=INFO
logging.level.com.checkfood=INFO
# Potlaceni nadbytecnych warnu
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR

# --- EMAIL ---
spring.mail.properties.mail.debug=false

# --- OSTATNI ---
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false