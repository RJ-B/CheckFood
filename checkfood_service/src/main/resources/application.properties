# ===============================================================
# HLAVNI KONFIGURACE (SPOLECNA)
# ===============================================================
spring.application.name=checkfood-service

# Pokud neni nastavena promenna prostredi, automaticky se zapne 'local'
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=8081

# Povoleni prekryvani definic beanu (Nutne pro Security, Feign a Cloud komponenty)
spring.main.allow-bean-definition-overriding=true

# ===============================================================
# 🚀 JAVA 21 & PERFORMANCE (Project Loom)
# ===============================================================
# Aktivace Virtual Threads - Toto je "killer feature" Javy 21 pro Spring Boot 3.2+
# Tomcat bude pouzivat virtualni vlakna misto platformnich.
spring.threads.virtual.enabled=true

# ===============================================================
# DATABAZE
# ===============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.open-in-view=false

# Flyway (Defaultne zapnuto, local profil to muze vypnout)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===============================================================
# SECURITY & JWT
# ===============================================================
security.jwt.secret=${JWT_SECRET}
# 1 hodina (3600s)
security.jwt.access-token-expiration-seconds=${JWT_EXPIRES:3600}
# 24 hodin (86400s)
security.jwt.refresh-token-expiration-seconds=${JWT_REFRESH:86400}
security.jwt.issuer=${JWT_ISSUER:checkfood-api}

# ===============================================================
# OAUTH2 CONFIGURATION
# ===============================================================
# Google
security.oauth.google.client-id=809801655996-hiubgqhjj2ae8cn9872pc693evonrfvp.apps.googleusercontent.com

# Apple
security.oauth.apple.client-id=${APPLE_CLIENT_ID}
security.oauth.apple.issuer=https://appleid.apple.com
security.oauth.apple.team-id=${APPLE_TEAM_ID}
security.oauth.apple.key-id=${APPLE_KEY_ID}
security.oauth.apple.private-key=${APPLE_PRIVATE_KEY}

# ===============================================================
# SECURITY AUDIT
# ===============================================================
security.audit.enabled=${SECURITY_AUDIT_ENABLED:true}
security.audit.retention-days=${SECURITY_AUDIT_RETENTION:30}

# ===============================================================
# EMAIL / SMTP
# ===============================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================================================
# OSTATNI
# ===============================================================
app.backend.url=${APP_BACKEND_URL:http://localhost:8081}

spring.mvc.hiddenmethod.filter.enabled=true
# Deaktivace kontroly kompatibility (vynuceni startu i s neoverenou verzi Spring Cloud)
spring.cloud.compatibility-verifier.enabled=false

# Swagger / OpenAPI UI path
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Swagger anonymous access.
# Default: true (dev/local convenience). Prod profile overrides this
# to false in application-prod.properties so only ADMIN users may
# reach /v3/api-docs + /swagger-ui/**.
app.swagger.public-access=true

server.servlet.encoding.force=true

# ===============================================================
# HTTP COMPRESSION
# ===============================================================
# Enable gzip on JSON responses. The biggest payload by far is
# /api/v1/restaurants/all-markers — currently ~1.9 MB raw for 12k+
# rows. Gzip on the marker JSON shrinks it to ~150–250 KB
# (8–12× ratio for that kind of repetitive structure), which moves
# the cold-start latency from "wait 2+ s" to "wait 200–400 ms" on a
# typical mobile connection.
#
# Threshold 1024 B avoids wasting CPU on tiny responses (login
# tokens, single-record GETs, error envelopes).
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

overture.release.path=s3://overturemaps-us-west-2/release/2026-*/theme=places/type=place/*.parquet

# ===============================================================
# ACTUATOR HEALTH GROUPS
# ===============================================================
# Vypnout mail health indicator. Spring Boot Actuator implicitně registruje
# `MailHealthIndicator`, který se snaží otevřít SMTP spojení při každém volání
# `/actuator/health`. To je problém ze dvou důvodů:
#
#   1) V CI prostředí (k6, ZAP, MobSF, atd.) startujeme service bez SMTP
#      credentials, takže health check vždy vrátí 500 → workflows padají,
#      aniž by aplikace měla skutečný problém.
#   2) V produkci by jediný SMTP outage maskoval celý service jako "nezdravý"
#      a Cloud Run by ho přestal servírovat, i když 95 % endpointů (rezervace,
#      menu, mapy) na e-mailu vůbec nezávisí.
#
# Mailové selhání řešíme retry mechanismem v EmailService — health check je
# nesprávná vrstva pro tuhle kontrolu.
management.health.mail.enabled=false

# ===============================================================
# DINING CONTEXT
# ===============================================================
dining.context.grace-before-minutes=${DINING_GRACE_BEFORE:30}
dining.context.grace-after-minutes=${DINING_GRACE_AFTER:30}

# ===============================================================
# GOOGLE CLOUD STORAGE
# ===============================================================
# Veřejný bucket pro restaurantní content (loga, cover, galerie, panorama, menu)
gcs.public-bucket-name=${GCS_BUCKET_NAME:checkfood-uploads}
# Privátní bucket pro avatary uživatelů a citlivý content (signed URLs only)
gcs.private-bucket-name=${GCS_PRIVATE_BUCKET_NAME:checkfood-private}

# Lokální storage adresáře (jen pro local/test profil)
app.storage.public-dir=${APP_STORAGE_PUBLIC_DIR:./uploads/public}
app.storage.private-dir=${APP_STORAGE_PRIVATE_DIR:./uploads/private}

# ===============================================================
# MOONE (ZNPAY) PAYMENT GATEWAY
# ===============================================================
moone.login=${MOONE_LOGIN:}
moone.password=${MOONE_PASSWORD:}
moone.pay-point-id=${MOONE_PAY_POINT_ID:}