# ===============================================================
# TEST PROFILE CONFIGURATION
# ===============================================================

# --- DATABASE (H2 In-Memory, PostgreSQL compatible mode) ---
spring.datasource.url=jdbc:h2:mem:checkfood_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false

# --- JWT (Short-lived for fast tests) ---
security.jwt.secret=TestSecretKeyForIntegrationTests_MinLength32Characters_CheckFood!!
security.jwt.access-token-expiration-seconds=300
security.jwt.refresh-token-expiration-seconds=3600
security.jwt.issuer=checkfood-test

# --- OAuth (Dummy values - providers are mocked in tests) ---
security.oauth.google.client-id=test-google-client-id
security.oauth.apple.client-id=test-apple-client-id
security.oauth.apple.issuer=https://appleid.apple.com
security.oauth.apple.team-id=test-team
security.oauth.apple.key-id=test-key
security.oauth.apple.private-key=test-private-key

# --- Email (Will be mocked via @MockitoBean) ---
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# --- CORS ---
cors.allowed-origins=http://localhost

# --- Misc ---
spring.cloud.compatibility-verifier.enabled=false
security.audit.enabled=false
app.backend.url=http://localhost:8081
spring.main.allow-bean-definition-overriding=true
spring.threads.virtual.enabled=false
logging.level.com.checkfood=WARN
