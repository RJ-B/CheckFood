# ===============================================================
# TEST PROFILE CONFIGURATION
# ===============================================================

# --- DATABASE (H2 In-Memory, PostgreSQL compatible mode) ---
spring.datasource.url=jdbc:h2:mem:checkfood_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Enable Hibernate statistics so HibernateQueryCounter (test support/)
# can read prepared-statement counts per test and assert N+1 bounds.
spring.jpa.properties.hibernate.generate_statistics=true

# --- JWT (Short-lived for fast tests) ---
security.jwt.secret=TestSecretKeyForIntegrationTests_MinLength32Characters_CheckFood!!
security.jwt.access-token-expiration-seconds=300
security.jwt.refresh-token-expiration-seconds=3600
security.jwt.issuer=checkfood-test

# --- OAuth (Dummy values - providers are mocked in tests) ---
security.oauth.google.client-id=test-google-client-id
security.oauth.apple.client-id=test-apple-client-id
security.oauth.apple.issuer=https://appleid.apple.com
security.oauth.apple.team-id=test-team
security.oauth.apple.key-id=test-key
security.oauth.apple.private-key=test-private-key

# Disable OAuth ID-token replay guard in tests — the integration suite
# reuses a single fake "fake-google-id-token" literal across dozens of
# test methods in the same JVM, which would otherwise trip the cache.
security.oauth.replay-guard.enabled=false

# Swagger anonymous access stays on in tests so anon-access matchers work.
app.swagger.public-access=true

# --- Email (Will be mocked via @MockitoBean) ---
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# --- CORS ---
cors.allowed-origins=http://localhost

# --- Misc ---
spring.cloud.compatibility-verifier.enabled=false
security.audit.enabled=false
app.backend.url=http://localhost:8081
spring.main.allow-bean-definition-overriding=true
spring.threads.virtual.enabled=false
logging.level.com.checkfood=WARN

# --- GCS (test = not used, but property must exist) ---
gcs.public-bucket-name=test-public-bucket
gcs.private-bucket-name=test-private-bucket
app.storage.public-dir=./build/test-uploads/public
app.storage.private-dir=./build/test-uploads/private
