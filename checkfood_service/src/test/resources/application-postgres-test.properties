# ===============================================================
# POSTGRES-TEST PROFILE — used by BasePostgresIntegrationTest
# datasource URL/user/password are overridden via @DynamicPropertySource
# ===============================================================

# --- JPA ---
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway runs against real Postgres so spatial extensions are available
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT ---
security.jwt.secret=TestSecretKeyForIntegrationTests_MinLength32Characters_CheckFood!!
security.jwt.access-token-expiration-seconds=300
security.jwt.refresh-token-expiration-seconds=3600
security.jwt.issuer=checkfood-test

# --- OAuth (mocked) ---
security.oauth.google.client-id=test-google-client-id
security.oauth.apple.client-id=test-apple-client-id
security.oauth.apple.issuer=https://appleid.apple.com
security.oauth.apple.team-id=test-team
security.oauth.apple.key-id=test-key
security.oauth.apple.private-key=test-private-key

# --- Email (mocked) ---
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# --- CORS ---
cors.allowed-origins=http://localhost

# --- Misc ---
spring.cloud.compatibility-verifier.enabled=false
security.audit.enabled=false
app.backend.url=http://localhost:8081
spring.main.allow-bean-definition-overriding=true
spring.threads.virtual.enabled=false
logging.level.com.checkfood=WARN

# --- GCS ---
gcs.public-bucket-name=test-public-bucket
gcs.private-bucket-name=test-private-bucket
app.storage.public-dir=./build/test-uploads/public
app.storage.private-dir=./build/test-uploads/private

# --- Dining context ---
dining.context.grace-before-minutes=30
dining.context.grace-after-minutes=30

# --- Payment (unused in tests) ---
moone.login=
moone.password=
moone.pay-point-id=
