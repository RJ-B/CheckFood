# ===============================================================
# POSTGRES-TEST PROFILE — used by BasePostgresIntegrationTest
# datasource URL/user/password are overridden via @DynamicPropertySource
# ===============================================================

# --- JPA ---
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Schema bootstrap strategy — TESTS use Hibernate DDL, NOT Flyway.
#
#   1. Hibernate generates the full DDL from JPA entities on startup
#      (ddl-auto=create-drop — fresh per test container).
#   2. Flyway is DISABLED here because the incremental V1..V4 migrations
#      assume the 'initial' schema already exists from a prior production
#      state (V1 drops permissions tables, V3 drops restaurant.owner_id).
#      Running them against a just-minted Hibernate schema would either
#      no-op or fail on missing FK constraints.
#
# DEFERRED FOLLOW-UP: a proper Flyway-first test path would require a
# V0 baseline migration that captures the full pre-V1 schema (with
# permissions tables + restaurant.owner_id). Generating it safely
# requires a hibernate schema-export run against a tagged pre-V1 git
# revision — this is tracked as a separate infra task, not a test gap,
# because the JPA entities themselves ARE the source of truth today
# and they round-trip correctly via ddl-auto. Production migrations
# are exercised manually in staging before each deploy.
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# --- JWT ---
security.jwt.secret=TestSecretKeyForIntegrationTests_MinLength32Characters_CheckFood!!
security.jwt.access-token-expiration-seconds=300
security.jwt.refresh-token-expiration-seconds=3600
security.jwt.issuer=checkfood-test

# --- OAuth (mocked) ---
