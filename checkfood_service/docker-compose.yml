# Docker Compose pro LOKÁLNÍ VÝVOJ
# Produkce běží na Cloud Run + Cloud SQL
services:
  # --- DATABÁZE (PostgreSQL + PostGIS) ---
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: checkfood-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: checkfood
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d checkfood"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - checkfood-network

volumes:
  postgres_data:

networks:
  checkfood-network:
    driver: bridge
