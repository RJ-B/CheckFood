services:
  # --- DATABÁZE (PostgreSQL + PostGIS) ---
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: checkfood-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: checkfood
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d checkfood"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - checkfood-network

  # --- BACKEND (Java Spring Boot) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkfood-service
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Propojení na DB kontejner přes název služby 'db'
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/checkfood
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      # Virtual Threads (Java 21)
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
    ports:
      - "8081:8081"
    networks:
      - checkfood-network

# --- DEFINICE VOLUME A SÍTÍ ---
volumes:
  postgres_data:

networks:
  checkfood-network:
    driver: bridge